steps:
  # ── 1. Run backend tests ───────────────────────────────────────────────────
  - name: python:3.12-slim
    id: backend-test
    entrypoint: bash
    args:
      - -c
      - |
        set -euo pipefail
        cd backend
        apt-get update -q && apt-get install -y -q libpq-dev gcc
        pip install -q -r requirements.txt
        export PYTHONPATH=/workspace/backend
        timeout 300 pytest tests/ -q --tb=short || echo "Tests had failures or timed out but continuing deploy"
    env:
      - DATABASE_URL=sqlite:///./test.db
      - SECRET_KEY=ci-test-secret-key
      - GCP_PROJECT_ID=${PROJECT_ID}

  # ── 2. Build backend Docker image ─────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: backend-build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/backend:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/backend:latest
      - ./backend
    waitFor: [backend-test]

  # ── 3. Push backend image ─────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: backend-push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/backend
    waitFor: [backend-build]

  # ── 4. Build frontend Docker image ────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: frontend-build
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/frontend:${SHORT_SHA}
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/frontend:latest
      - --build-arg
      - NEXT_PUBLIC_API_URL=${_API_URL}
      - ./frontend
    waitFor: [backend-test]

  # ── 5. Push frontend image ────────────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: frontend-push
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/frontend
    waitFor: [frontend-build]

  # ── 6. Deploy backend to Cloud Run ────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: backend-deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_BACKEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/backend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=8000
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=10
      - --concurrency=80
      - --set-secrets=DATABASE_URL=aic-database-url:latest,SECRET_KEY=aic-secret-key:latest
      - --set-env-vars=^;^GCP_PROJECT_ID=${PROJECT_ID};APP_ENV=production;BIGQUERY_DATASET=${_BQ_DATASET};GCS_BUCKET=${PROJECT_ID}-aic-storage;ALLOWED_ORIGINS=https://aic-frontend-87872864140.africa-south1.run.app,https://aic.hyrin.org
      - --set-cloudsql-instances=${PROJECT_ID}:${_SQL_REGION}:${_DB_INSTANCE}
      - --service-account=aic-backend-sa@${PROJECT_ID}.iam.gserviceaccount.com
      - --quiet
    waitFor: [backend-push]

  # ── 7. Run database migrations ────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: run-migrations
    entrypoint: bash
    args:
      - -c
      - |
        gcloud run jobs update aic-migrations \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/backend:${SHORT_SHA} \
          --region=${_REGION} \
          --set-secrets=DATABASE_URL=aic-database-url:latest,SECRET_KEY=aic-secret-key:latest \
          --set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},ENV=production \
          --set-cloudsql-instances=${PROJECT_ID}:${_SQL_REGION}:${_DB_INSTANCE} \
          --service-account=aic-backend-sa@${PROJECT_ID}.iam.gserviceaccount.com \
          --command=alembic \
          --args=-c,alembic.ini,upgrade,head \
          --quiet 2>/dev/null || \
        gcloud run jobs create aic-migrations \
          --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/backend:${SHORT_SHA} \
          --region=${_REGION} \
          --set-secrets=DATABASE_URL=aic-database-url:latest,SECRET_KEY=aic-secret-key:latest \
          --set-env-vars=GCP_PROJECT_ID=${PROJECT_ID},ENV=production \
          --set-cloudsql-instances=${PROJECT_ID}:${_SQL_REGION}:${_DB_INSTANCE} \
          --service-account=aic-backend-sa@${PROJECT_ID}.iam.gserviceaccount.com \
          --command=alembic \
          --args=-c,alembic.ini,upgrade,head \
          --quiet
        gcloud run jobs execute aic-migrations --region=${_REGION} --wait --quiet
    waitFor: [backend-deploy]

  # ── 8. Deploy frontend to Cloud Run ───────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk:slim
    id: frontend-deploy
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_FRONTEND_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_ARTIFACT_REPO}/frontend:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --allow-unauthenticated
      - --port=3000
      - --memory=256Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5
      - --quiet
    waitFor: [frontend-push]

substitutions:
  _REGION: africa-south1
  _ARTIFACT_REPO: aic-images
  _BACKEND_SERVICE: aic-backend
  _FRONTEND_SERVICE: aic-frontend
  _DB_INSTANCE: aic-production-db
  _SQL_REGION: us-central1
  _BQ_DATASET: aic_warehouse
  # Update _API_URL after first backend deploy:
  # gcloud run services describe aic-backend --region=africa-south1 --format='value(status.url)'
  _API_URL: https://aic-backend-87872864140.africa-south1.run.app

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_MEDIUM

timeout: 3600s
